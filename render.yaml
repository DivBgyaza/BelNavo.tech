services:
  - type: web
    name: belnavo-tech
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: belnavo-tech-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/storage
