<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment Verification - BelNavo tech</title>
  <meta name="description" content="Verifying your BelNavo tech card payment." />
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#94a3b8;--accent:#7c3aed;--accent-2:#06b6d4}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,system-ui;background:radial-gradient(1000px 500px at 20% 10%, rgba(124,58,237,.12), transparent),var(--bg);color:#e6eef8;display:grid;place-items:center;padding:24px}
    .card{width:min(720px,100%);background:linear-gradient(180deg, rgba(255,255,255,.04), transparent);border-radius:18px;padding:24px;box-shadow:0 20px 70px rgba(2,6,23,.6)}
    .logo{width:64px;height:64px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .logo img{width:100%;height:100%;object-fit:cover;display:block}
    .status{padding:14px;border-radius:14px;background:rgba(255,255,255,.03);margin-top:16px}
    .muted{color:var(--muted)}
    .btn{display:inline-block;margin-top:16px;padding:12px 16px;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/assets/belnavo-logo.png" alt="BelNavo tech logo"></div>
    <h1 style="margin:0 0 8px">Verifying your payment</h1>
    <p class="muted" style="margin:0">Please wait while we confirm your card payment securely.</p>
    <div id="result" class="status">Loading transaction details...</div>
    <a class="btn" href="/">Return to website</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const transactionId = params.get('transaction_id') || params.get('id');
    const txRef = params.get('tx_ref') || params.get('txRef');
    const result = document.getElementById('result');

    async function verify() {
      if (!transactionId || !txRef) {
        result.textContent = 'We could not find the payment reference from Flutterwave.';
        return;
      }
      try {
        result.textContent = 'Checking transaction status...';
        const res = await fetch('/api/payments/card/verify', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ transactionId, txRef })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Verification failed.');
        result.innerHTML = `Payment confirmed for booking <strong>${data.bookingCode}</strong>. Amount: <strong>N${Number(data.amount).toLocaleString('en-NG')}</strong>.`;
      } catch (err) {
        result.textContent = err.message;
      }
    }

    verify();
  </script>
</body>
</html>
